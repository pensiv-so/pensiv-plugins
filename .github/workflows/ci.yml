name: ci

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref (e.g. force-pushed PR branches).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - run: npm ci

      - name: Typecheck (SDK + every plugin)
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build (SDK + all plugins)
        run: npm run build

      - name: Test
        run: npm test
