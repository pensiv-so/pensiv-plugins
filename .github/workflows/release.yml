name: release

# Manual-only for now: npm publishing isn't decided yet. Leaving this on a
# `push: main` trigger would make `changeset publish` run (and fail, since no
# NPM_TOKEN is set) on every push. When you're ready to publish:
#   1. add an `NPM_TOKEN` repo secret,
#   2. switch the trigger below to `on: push: branches: [main]`.
on:
  workflow_dispatch:

concurrency: release-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write # npm provenance

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci

      # Opens/updates a "Version Packages" PR; when that PR is merged, publishes
      # any package with a consumed changeset to npm (with provenance).
      - uses: changesets/action@v1
        with:
          version: npm run version-packages
          publish: npm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'
